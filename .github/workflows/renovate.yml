name: Renovate
on:
  schedule:
    # run twice: once for creating branches, and then again for automerging after the CI checks have passed
    - cron: 24,54 8 * * 6
  workflow_dispatch:
permissions:
  contents: read
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Renovate
        uses: renovatebot/github-action@v46.1.3
        with:
          configurationFile: .github/renovate-admin.json
          token: ${{ secrets.DISCE_RENOVATE_PAT }}
        env:
          LOG_LEVEL: debug
